name: content-capability-gate

on:
  pull_request:
    paths:
      - "src/dnd_sim/io.py"
      - "scripts/content/**"
      - "tests/test_capability_gates.py"
      - "tests/fixtures/capability_gates/**"
      - ".github/workflows/content-capability-gate.yml"
  push:
    paths:
      - "src/dnd_sim/io.py"
      - "scripts/content/**"
      - "tests/test_capability_gates.py"
      - "tests/fixtures/capability_gates/**"
      - ".github/workflows/content-capability-gate.yml"

jobs:
  verify-capability-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run capability gate verifier
        run: uv run python scripts/content/verify_capabilities.py

      - name: Run capability gate tests
        run: uv run python -m pytest tests/test_capability_gates.py
